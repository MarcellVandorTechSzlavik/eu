<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Német Euro érmék</title>
    <style>
        /* Alap és Háttérkép */
        body { 
            margin: 0; padding: 20px; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            position: relative; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-image: url('hatter.jpg'); 
            background-size: cover; background-position: center;
            opacity: 0.5;
        }

        .content-wrapper {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 100%; max-width: 850px;
        }

        .nav-header { margin-bottom: 20px; }
        .back-btn { 
            text-decoration: none; color: #444; font-weight: bold;
            padding: 5px 10px; border: 1px solid #ccc;
            border-radius: 5px; background: #fff;
        }
        .back-btn:hover { background: #333; color: #fff; }

        h2 { margin: 10px 0 20px 0; border-bottom: 2px solid #333; padding-bottom: 10px; }

        .table { display: table; border-collapse: collapse; width: 100%; }
        .header-row { display: table-row; background: #eee; font-weight: bold; }
        .row { display: table-row; }
        .row:hover { background-color: rgba(0,0,0,0.03); }

        .cell { 
            display: table-cell; padding: 10px 5px; 
            border-bottom: 1px solid #ddd; vertical-align: middle; text-align: center;
        }
        .year { font-weight: bold; width: 60px; text-align: left; padding-left: 10px; }
        .no-coin { color: #bbb; font-size: 0.8em; }

        input[type="checkbox"] { transform: scale(1.2); margin-right: 5px; cursor: pointer; }
        label { cursor: pointer; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="content-wrapper">
    <div class="nav-header">
        <a href="index.html" class="back-btn">← Vissza a főoldalra</a>
    </div>

    <h2>🇩🇪 Németország (A)</h2>

    <div style="margin-bottom: 20px; background: #f0f0f0; padding: 15px; border-radius: 10px;">
        <div style="font-weight: bold; margin-bottom: 5px;">
            Gyűjtemény állapota: <span id="stat-count">0 / 0</span>
        </div>
        <div style="background: rgba(0,0,0,0.1); height: 10px; border-radius: 5px; overflow: hidden;">
            <div id="stat-bar" style="width: 0%; height: 100%; background: #dd0000; transition: 0.5s;"></div>
        </div>
    </div>

    <div id="main-table" class="table">
        <div class="header-row">
            <div class="cell">Év</div>
            <div class="cell">1c</div><div class="cell">2c</div><div class="cell">5c</div>
            <div class="cell">10c</div><div class="cell">20c</div><div class="cell">50c</div>
            <div class="cell">€1</div><div class="cell">€2</div>
        </div>
        </div>
</div>
<script>
    // Adatstruktúra a kép alapján: true = forgalmi, false = szürke/nincs
    const data = {
        2026: [true, true, true, false, true, false, false, true],
        2025: [false, false, false, false, false, true, false, true],
        2024: [true, false, true, true, true, true, false, true],
        2023: [true, true, true, true, true, true, false, true],
        2022: [false, true, true, true, true, true, false, false],
        2021: [true, true, true, true, true, false, false, true],
        2020: [true, true, true, true, true, false, false, true],
        2019: [true, true, true, true, true, false, false, true],
        2018: [true, true, true, true, true, false, false, false], // 2€ nincs
        2017: [true, true, true, true, true, false, false, true],
        2016: [true, true, true, false, true, false, false, true],
        2015: [true, true, true, false, true, false, false, false],
        2014: [true, true, true, false, true, false, false, true],
        2013: [true, true, true, false, true, false, false, false],
        2012: [true, true, true, false, true, false, false, false],
        2011: [true, true, true, false, true, false, false, true],
        2010: [true, true, true, false, true, false, false, true],
        2009: [true, true, true, false, true, false, false, false],
        2008: [true, true, true, false, true, false, false, true],
        2007: [true, true, true, false, true, false, false, false],
        2006: [false, true, true, false, true, false, false, false],
        2005: [true, true, true, false, true, false, false, false],
        2004: [true, true, true, true, true, false, true, true],
        2003: [false, true, false, true, true, true, false, true],
        2002: [true, true, true, true, true, true, true, true]
    };

    const coins = ['1c', '2c', '5c', '10c', '20c', '50c', '€1', '€2'];
    const table = document.getElementById('main-table');

    // 1. Kiszámoljuk a lehetséges maximumot
    function getPossibleTotal() {
        let total = 0;
        Object.values(data).forEach(yearArray => {
            yearArray.forEach(exists => { if (exists) total++; });
        });
        return total;
    }

    // 2. Statisztika frissítése
    function updateLocalStats() {
        const totalPossible = getPossibleTotal();
        let currentChecked = 0;
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            if (cb.checked) currentChecked++;
        });
        const percent = totalPossible > 0 ? Math.round((currentChecked / totalPossible) * 100) : 0;
        document.getElementById('stat-count').innerText = `${currentChecked} / ${totalPossible} érme (${percent}%)`;
        document.getElementById('stat-bar').style.width = percent + '%';
    }

    // 3. Táblázat legenerálása
    Object.keys(data).sort((a, b) => b - a).forEach(year => {
        const row = document.createElement('div');
        row.className = 'row';
        let html = `<div class="cell year">${year}</div>`;
        
        data[year].forEach((ok, i) => {
            const id = `c-${year}-${i}`;
            html += `<div class="cell">`;
            if (ok) {
                // Itt hozzáadtam az updateLocalStats() hívást az onchange-hez!
                html += `<input type="checkbox" id="${id}" onchange="localStorage.setItem('${id}', this.checked); updateLocalStats()"> <label for="${id}">${coins[i]}</label>`;
            } else {
                html += `<span class="no-coin">-</span>`;
            }
            html += `</div>`;
        });
        
        row.innerHTML = html;
        table.appendChild(row);
    });

    // 4. Betöltés (Csak egy ablak betöltés esemény legyen!)
    window.onload = () => {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.checked = localStorage.getItem(cb.id) === 'true';
        });
        updateLocalStats();
    };
</script>
</body>
</html>
